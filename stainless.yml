# stainless.yml — generated from apps/api/openapi.json
# Source spec: openapi 3.1.0, info "VAIF Studio API"
# This is a starter mapping. Refine method names + nesting as needed.

organization:
  name: vaif
  docs: https://docs.vaif.studio
  contact: support@vaif.tech

client_settings:
  opts:
    api_key:
      type: string
      nullable: true
      auth:
        security_scheme: ApiKeyAuth
    bearer_token:
      type: string
      nullable: true
      auth:
        security_scheme: BearerAuth

security:
  - ApiKeyAuth: []
  - BearerAuth: []

targets:
  typescript:
    package_name: "@vaif/client"
    production_repo: VAIF-TECH/vaif-js
    publish:
      npm: true
  python:
    package_name: vaif
    project_name: vaif
    production_repo: VAIF-TECH/vaif-python
    publish:
      pypi: true

environments:
  production: https://api.vaif.studio

readme:
  example_requests:
    default:
      type: request
      endpoint: post /auth/login
      params:
        email: alice@example.com
        password: secret-password
    headline:
      type: request
      endpoint: post /auth/login
      params:
        email: alice@example.com
        password: secret-password
    pagination:
      type: request
      endpoint: get /v1/project
      params: {}

